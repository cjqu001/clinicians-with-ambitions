<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Clinicians with Ambitions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#080d1a;--bg2:#0d1526;--card:#111827;--card-border:#1e3a5f;--blue:#3b82f6;--cyan:#06b6d4;--gold:#f59e0b;--text:#e2e8f0;--muted:#94a3b8;--subtle:#1e2d40;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
    h1,h2,h3{font-family:'Space Grotesk',sans-serif;}
    a{color:var(--blue);text-decoration:none;}
    a:hover{color:var(--cyan);}
    .site-nav{background:rgba(8,13,26,0.93);backdrop-filter:blur(14px);border-bottom:1px solid var(--subtle);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
    .nav-brand{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;color:var(--text);}
    .nav-brand span{color:var(--cyan);}
    .nav-back{font-size:0.85rem;color:var(--muted);}
    .nav-back:hover{color:var(--text);}
    .page-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px;background:radial-gradient(ellipse 70% 55% at 50% 0%,rgba(59,130,246,0.09) 0%,transparent 65%);}
    .signin-card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:48px 44px;width:100%;max-width:420px;text-align:center;}
    .brand-mark{display:inline-flex;width:52px;height:52px;border-radius:14px;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:20px;}
    .signin-card h1{font-size:1.45rem;margin-bottom:8px;}
    .subtitle{color:var(--muted);font-size:0.87rem;margin-bottom:36px;line-height:1.65;}
    .form-group{margin-bottom:16px;text-align:left;}
    .form-group label{display:block;font-size:0.78rem;font-weight:600;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:0.07em;}
    .form-group input{width:100%;background:var(--bg2);border:1px solid var(--subtle);border-radius:8px;padding:12px 14px;color:var(--text);font-size:0.93rem;font-family:inherit;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
    .form-group input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,0.12);}
    .form-group input::placeholder{color:#4a5568;}
    .btn{display:flex;align-items:center;justify-content:center;width:100%;padding:13px 24px;border-radius:10px;font-weight:600;font-size:0.95rem;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s;margin-top:6px;}
    .btn-primary{background:var(--blue);color:#fff;}
    .btn-primary:hover{background:#2563eb;transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.3);}
    .btn-outline{background:transparent;color:var(--text);border:1px solid var(--card-border);}
    .btn-outline:hover{border-color:var(--blue);color:var(--blue);}
    .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--subtle);font-size:0.78rem;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--subtle);}
    .invite-note{margin-top:22px;font-size:0.8rem;color:var(--muted);line-height:1.6;}
    .invite-note a{color:var(--cyan);}
    footer{border-top:1px solid var(--subtle);padding:24px;text-align:center;color:var(--muted);font-size:0.82rem;}
    footer a{color:var(--muted);}
    footer a:hover{color:var(--text);}
  </style>
</head>
<body>

<nav class="site-nav">
  <a href="https://cjqu001.github.io/clinicians-with-ambitions/" class="nav-brand">Clinicians <span>with Ambitions</span></a>
  <a href="https://cjqu001.github.io/clinicians-with-ambitions/" class="nav-back">← Back</a>
</nav>

<div class="page-wrap">
  <div class="signin-card">
    <div class="brand-mark">⚕️</div>
    <h1>Member Access</h1>
    <p class="subtitle">Invite-only access for approved clinicians,<br>collaborators, and research partners.</p>

    <form onsubmit="return false;">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
      <div class="divider">or</div>
      <button type="button" class="btn btn-outline" onclick="document.getElementById('invite-form').style.display='block';this.style.display='none';">Request an Invite</button>
    </form>

    <div id="invite-form" style="display:none;margin-top:16px;">
      <div class="form-group">
        <label for="invite-name">Full Name</label>
        <input type="text" id="invite-name" placeholder="Dr. Jane Smith">
      </div>
      <div class="form-group">
        <label for="invite-email">Email Address</label>
        <input type="email" id="invite-email" placeholder="you@institution.edu">
      </div>
      <div class="form-group">
        <label for="invite-role">Role / Institution</label>
        <input type="text" id="invite-role" placeholder="Resident, MD — Johns Hopkins">
      </div>
      <button type="button" class="btn btn-primary" onclick="this.textContent='Request Sent ✓';this.style.background='#059669';this.disabled=true;">Submit Access Request</button>
    </div>

    <p class="invite-note">Questions? <a href="mailto:cqtq2025@gmail.com">cqtq2025@gmail.com</a></p>
  </div>
</div>

<footer>
  <p>© 2025 Clinicians with Ambitions &nbsp;·&nbsp; <a href="https://cjqu001.github.io/clinicians-with-ambitions/">Home</a></p>
</footer>

</body>
</html>
